[pytest]
# E2E tests run directly against live Hummingbot connectors.
# This file is the rootdir when running:  pytest test/e2e_tests/ -v
# It overrides the repo-root pyproject.toml for asyncio settings.

# Event-loop management is handled by pytest-asyncio 1.x via:
#   - asyncio_default_fixture_loop_scope = module  (pytest.ini in this directory)
#   - @pytest.mark.asyncio(loop_scope="module")    (TestConnectorE2E class)

asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
testpaths = .
